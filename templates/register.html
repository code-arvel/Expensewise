<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/register.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header class="header">
        <div class="company-name">
            ExpenseWise
        </div>

        <nav class="nav-links">
            <a href="{{ url_for('about') }}">About<i class="bi bi-person-lines-fill"></i></a>
            <a href="">Contact<i class="bi bi-telephone"></i></a>
        </nav>
    </header>

    <main class="main-content">
    <div class="signup-container">
        <h2>Create Account</h2>

        <form>
            <div class="name-group">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" placeholder="Enter first name" required>
                </div>

                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" placeholder="Enter last name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="regnumber">School Registration Number</label>
                <input type="text" id="regnumber" placeholder="Enter registration number" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="signup-btn">
                Sign Up
            </button>

            <p class="login-text">
                Already have an account?
                <a href="{{ url_for('login') }}">Login</a>
            </p>
        </form>
    </div>
    </main>
</body>
</html>
